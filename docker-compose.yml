name: gastronomia

services:
  backend:
    build:
      context: ./Документация/back
    container_name: restaurant-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/restaurant.db}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-before-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      INIT_SAMPLE_DATA: ${INIT_SAMPLE_DATA:-true}
    volumes:
      - backend_images:/app/images
      - backend_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3344/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./Документация/front
    container_name: restaurant-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  backend_images:
  backend_data:
