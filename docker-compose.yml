services:
  backend:
    build:
      context: ./Документация/back
    container_name: restaurant-backend
    environment:
      DATABASE_URL: sqlite:///./restaurant.db
      SECRET_KEY: 9f3c8a7e6d5b4a3c2e1f0d9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4e3d2c1b0a9f
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_EMAIL: admin@restaurant.com
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./docker-data/backend/images:/app/images
      - ./docker-data/backend/restaurant.db:/app/restaurant.db
    restart: unless-stopped

  frontend:
    build:
      context: ./Документация/front
    container_name: restaurant-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
